<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <title>vue-markdown-editor</title>
    <link rel="stylesheet" type="text/css" href="..//lib/style/base-editor.css" />
    <script>
      window.Promise ||
        document.write('<script src="//img.yzcdn.cn/huiyi/build/h5/js/pinkie.min.js"><\/script>');
    </script>
  </head>
  <body>
    <div id="app">
      <v-md-editor height="400px"></v-md-editor>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="../lib/base-editor.js"></script>
    <script src="../lib/theme/vuepress.js"></script>
    <script>
      window.onload = function () {
        const app = Vue.createApp({});

        if (window.VMdEditorVuepressTheme) {
          window.VMdEditor.use(window.VMdEditorVuepressTheme.default || window.VMdEditorVuepressTheme);
        }

        app.use(window.VMdEditor);
        app.mount('#app');

        console.log(app);
      };
    </script>
  </body>
</html>
